name: trustpay
description: "Application de gestion financière et paiement pour particuliers et PME en Afrique de l’Ouest."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^13.2.0
  
  # Network
  dio: ^5.4.1
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  
  # UI & Components
  fl_chart: ^0.66.0
  mobile_scanner: ^3.5.2
  qr_flutter: ^4.1.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10+1
  skeletonizer: ^1.0.1
  intl: ^0.19.0
  speech_to_text: ^7.0.0
  connectivity_plus: ^6.0.5
  
  # Dependency Injection
  get_it: ^7.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  #fonts
  fonts:
    - family: MontserratSemiBold
      fonts:
        - asset: assets/fonts/MontserratSemiBold.otf

    - family: PoppinsSemiBold
      fonts:
        - asset: assets/fonts/Poppins/PoppinsSemiBold.ttf #assets/fonts/Poppins/PoppinsSemiBold.ttf

    - family: PoppinsBold
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf

    - family: PoppinsMedium
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf

    - family: PoppinsLight
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Light.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/logo.jpeg
  remove_alpha_ios: true
